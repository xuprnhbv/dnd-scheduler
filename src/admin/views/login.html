<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>D&amp;D Bot — Login</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #111; color: #eee; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    form { background: #1b1b1b; padding: 24px 28px; border-radius: 8px; width: min(360px, 92vw); box-shadow: 0 4px 24px rgba(0,0,0,0.5); }
    h1 { margin: 0 0 16px; font-size: 20px; }
    label { display: block; margin-bottom: 6px; font-size: 13px; color: #bbb; }
    input[type=password] { width: 100%; box-sizing: border-box; padding: 10px; border: 1px solid #333; background: #0f0f0f; color: #eee; border-radius: 6px; font-size: 14px; }
    button { margin-top: 14px; width: 100%; padding: 10px; border: 0; border-radius: 6px; background: #b00; color: #fff; font-size: 15px; cursor: pointer; }
    button:hover { background: #d00; }
    .err { color: #f88; margin-top: 10px; font-size: 13px; }
  </style>
</head>
<body>
  <form method="post" action="/login">
    <h1>D&amp;D Bot Admin</h1>
    <label for="password">Password</label>
    <input id="password" type="password" name="password" autocomplete="current-password" autofocus />
    <button type="submit">Sign in</button>
    {{ERROR}}
  </form>
</body>
</html>
